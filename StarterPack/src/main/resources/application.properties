spring.application.name=StarterPack

app.database.name=starter-kit-db
app.database.username=app_user
app.database.password=123456
app.database.host=localhost
app.database.port=3308
app.allowed-origins = http://localhost
app.application-name=starter-kit
app.base-url=http://localhost:${server.port}
app.login-page-url=${app.base-url}/auth/login

spring.datasource.url=jdbc:mysql://${app.database.host}:${app.database.port}/${app.database.name}
spring.datasource.username=${app.database.username}
spring.datasource.password=${app.database.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port= 8080
server.servlet.context-path= /api

logging.level.org.springframework.security= DEBUG
logging.level.org.jobrunr=DEBUG

jobrunr.background-job-server.enabled=true
jobrunr.dashboard.enabled=true
jobrunr.dashboard.port=8000

# for mail
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=user
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

